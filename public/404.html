<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MAQASID</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the current path into a query parameter and redirects to root
      // index.html will pick this up and restore the path via history.replaceState
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
