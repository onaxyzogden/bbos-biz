<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAQASID — Islamic Life Operating System</title>
    <script>
      // SPA redirect pickup for GitHub Pages
      // 404.html redirects here with ?p=/original/path
      (function() {
        var sp = new URLSearchParams(window.location.search);
        var p = sp.get('p');
        if (p) {
          sp.delete('p');
          var remaining = sp.toString();
          var newUrl = p + (remaining ? '?' + remaining : '') + window.location.hash;
          history.replaceState(null, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
